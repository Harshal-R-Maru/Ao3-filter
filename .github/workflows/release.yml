name: Release with Zip

on:
  push:
    tags:
      - 'v*'   # Triggers when you push a tag like v2.0.0

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Zip Archive
        run: |
          # Create the zip with only essential files
          zip -r ao3-filter.zip \
            manifest.json \
            content.js \
            background.js \
            ao3_css_generator.html \
            style.css \
            modules/ \
            photos/ \
            README.md \
            -x "*.git*" \
            -x ".github/*" \
            -x "*.log" \
            -x "*.tmp"

      - name: Create Release and Upload Zip
        uses: softprops/action-gh-release@v1
        with:
          files: ao3-filter.zip
          generate_release_notes: true